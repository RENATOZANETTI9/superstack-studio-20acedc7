name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Unit tests (vitest) — required check. Failures block PR merges via
  # branch protection. Covers the permissions matrix, RepresentantesCatchAll,
  # useRepresentanteGuard and AppSidebar visibility.
  # ---------------------------------------------------------------------
  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json --noEmit
      - name: Vitest
        run: bun run test -- --reporter=default --reporter=junit --outputFile=vitest-junit.xml
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit
          path: vitest-junit.xml

  # ---------------------------------------------------------------------
  # Build — ensures the app still compiles. Blocking.
  # ---------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build

  # ---------------------------------------------------------------------
  # Index-usage gate: runs EXPLAIN (ANALYZE, BUFFERS) against the hot
  # commissions queries and fails the build if the planner falls back to a
  # Seq Scan on any of them. The script uses RAISE EXCEPTION on regression,
  # which propagates a non-zero exit through psql (--set ON_ERROR_STOP=on).
  #
  # Requires the following GitHub Actions secrets:
  #   VERIFY_DB_URL — full postgres:// URL to a database that has the
  #                   migration applied (staging is fine).
  # When VERIFY_DB_URL is not set, the job auto-skips so first-time forks
  # aren't broken.
  # ---------------------------------------------------------------------
  verify-indexes:
    name: Verify commission indexes (EXPLAIN ANALYZE)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Check for VERIFY_DB_URL
        id: has_url
        run: |
          if [ -z "${{ secrets.VERIFY_DB_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::VERIFY_DB_URL não configurado — pulando verificação de índices"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install psql
        if: steps.has_url.outputs.skip == 'false'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run EXPLAIN ANALYZE verification
        if: steps.has_url.outputs.skip == 'false'
        env:
          PGURL: ${{ secrets.VERIFY_DB_URL }}
        run: |
          set -e
          psql "$PGURL" --set ON_ERROR_STOP=on -f scripts/verify-commission-indexes.sql

  # ---------------------------------------------------------------------
  # E2E — representante access control matrix. Blocking.
  # Runs against a locally-built preview. Credentials (REP_EMAIL /
  # REP_PASS) come from GitHub Actions secrets; when absent the suite
  # auto-skips instead of failing so first-time forks aren't broken.
  # ---------------------------------------------------------------------
  e2e-representante:
    name: E2E — representante-access
    runs-on: ubuntu-latest
    needs: [unit, build]
    env:
      BASE_URL: http://127.0.0.1:4173
      REP_EMAIL: ${{ secrets.REP_EMAIL }}
      REP_PASS: ${{ secrets.REP_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Resolve Playwright version
        id: pw-ver-rep
        run: echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache-rep
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-ver-rep.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.pw-cache-rep.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi
      - name: Build app
        run: bun run build
      - name: Start preview server
        run: |
          bunx vite preview --port 4173 --host 127.0.0.1 &
          echo $! > preview.pid
          # Wait until the server is ready
          for i in $(seq 1 30); do
            if curl -sSf "$BASE_URL" >/dev/null; then
              echo "preview up"; break
            fi
            sleep 1
          done
      - name: Run representante-access E2E
        run: bun run test:e2e:representante -- --reporter=list
      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then kill "$(cat preview.pid)" || true; fi
      - name: Upload Playwright HTML report (representante)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-representante-${{ github.run_attempt }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload failure artifacts (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-representante-${{ github.run_attempt }}
          path: |
            test-results/**/trace.zip
            test-results/**/*.png
            test-results/**/*.webm
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------
  # E2E — accessibility gate for the PartnersRota AI alert + source badge.
  # Runs the axe-core assertions and focus/aria-live regression checks
  # that live in partners-rota-ai-format-alert.spec.ts. Blocking so that
  # any regression to the aria-live announcement or focus flow fails PR
  # merges. Credentials (ADMIN_EMAIL/ADMIN_PASS) come from GitHub Actions
  # secrets; when absent the suite auto-skips via test.skip().
  # ---------------------------------------------------------------------
  e2e-a11y:
    name: E2E — a11y (aria-live, focus, axe)
    runs-on: ubuntu-latest
    needs: [unit, build]
    env:
      BASE_URL: http://127.0.0.1:4173
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        id: pw-cache-a11y
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.pw-cache-a11y.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi
      - name: Build app
        run: bun run build
      - name: Start preview server
        run: |
          bunx vite preview --port 4173 --host 127.0.0.1 &
          echo $! > preview.pid
          for i in $(seq 1 30); do
            if curl -sSf "$BASE_URL" >/dev/null; then
              echo "preview up"; break
            fi
            sleep 1
          done
      - name: Run a11y E2E (partners-rota alert + badge)
        run: bun run test:e2e:a11y -- --reporter=list
      - name: Run visual regression (source badge/tooltip)
        run: bun run test:e2e:visual -- --reporter=list
      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then kill "$(cat preview.pid)" || true; fi
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y
          path: |
            playwright-report/
            test-results/
            e2e/__screenshots__/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------
  # Aggregate required-check: this is the single job you point branch
  # protection at. It only succeeds if every gate above succeeded, so any
  # divergence in the permissions matrix or route guards blocks the merge.
  # ---------------------------------------------------------------------
  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    needs: [unit, build, e2e-representante, e2e-a11y, verify-indexes]
    if: always()
    steps:
      - name: Fail if any dependency failed
        run: |
          if [ "${{ needs.unit.result }}" != "success" ] \
          || [ "${{ needs.build.result }}" != "success" ] \
          || [ "${{ needs.e2e-representante.result }}" != "success" ] \
          || [ "${{ needs.e2e-a11y.result }}" != "success" ] \
          || [ "${{ needs.verify-indexes.result }}" != "success" ]; then
            echo "One or more required checks failed:"
            echo "  unit=${{ needs.unit.result }}"
            echo "  build=${{ needs.build.result }}"
            echo "  e2e=${{ needs.e2e-representante.result }}"
            echo "  e2e-a11y=${{ needs.e2e-a11y.result }}"
            echo "  verify-indexes=${{ needs.verify-indexes.result }}"
            exit 1
          fi
          echo "All required checks passed."